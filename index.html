<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menudo App PRO v5.5</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 15px; 
        }
        
        .app-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .active-screen { display: block; }
        
        h2 { color: #333; text-align: center; margin-bottom: 20px; font-size: 24px; }
        
        button { 
            padding: 12px; margin: 4px 0; border: none; border-radius: 10px; cursor: pointer; 
            font-size: 16px; width: 100%; font-weight: bold; transition: 0.2s;
        }

        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-sync { background: #ffc107; color: #333; border: 2px solid #e0a800; margin-bottom: 20px; }
        
        .grid-productos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        
        .btn-prod { 
            height: 55px; border: 1px solid #ddd; font-size: 14px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            line-height: 1.1; 
        }
        
        .btn-blanco { background: #ffffff; color: #333; }
        .btn-gris { background: #e9ecef; color: #333; }
        .btn-amarillo { background: #ffeb3b; color: #333; border-color: #fdd835; }
        
        .btn-prod:active { transform: scale(0.95); opacity: 0.8; }
        
        .btn-custom { background: #6f42c1 !important; color: white !important; height: 45px; margin-bottom: 5px; }

        .flex-row { display: flex; gap: 5px; margin: 5px 0; }
        .btn-edad { 
            background: #fff; border: 1px solid #007bff; color: #007bff; 
            padding: 8px 2px; font-size: 10px; flex: 1; min-width: 0;
        }
        .btn-edad.selected { background: #007bff; color: white; }
        
        .resumen-total { font-size: 26px; font-weight: bold; text-align: center; color: #28a745; margin: 5px 0; padding: 5px; border-top: 1px solid #eee; }
        
        #btn-save { margin-top: 0; margin-bottom: 5px; }

        .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; font-size: 16px; }
        .lista-datos { list-style: none; padding: 0; margin: 0; }
        .lista-datos li { background: #f8f9fa; border: 1px solid #ddd; padding: 18px; margin-bottom: 10px; border-radius: 10px; }
        
        input, select { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }

        /* ESTILOS DEL MODAL DE VENTA ESPECIAL */
        #modal-especial {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-top: 0; text-align: center; color: #333; }
    </style>
</head>
<body>

<div id="modal-especial">
    <div class="modal-content">
        <h3 id="modal-titulo">Monto $$</h3>
        <input type="number" id="modal-monto" inputmode="decimal" placeholder="0.00" style="display: block; text-align: center; font-size: 24px;">
        <input type="text" id="modal-concepto" placeholder="¿Qué es?" style="display: none;">
        
        <button class="btn-success" id="btn-modal-next" onclick="modalSiguiente()">Siguiente</button>
        <button class="btn-secondary" onclick="cerrarModalEspecial()">Cancelar</button>
    </div>
</div>

<div class="app-container">
    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="snd-cash" src="https://www.soundjay.com/misc/sounds/cash-register-05.mp3" preload="auto"></audio>

    <div id="pantalla-portada" class="screen active-screen">
        <h2>Menudo App 🍲</h2>
        <button id="btn-sync-global" class="btn-sync" onclick="sincronizarTodo()" style="display:none;">
            🔄 Sincronizar Pedidos (<span id="count-sync">0</span>)
        </button>
        <ul id="lista-semanas" class="lista-datos"></ul>
        <button class="btn-primary" onclick="cambiarPantalla('pantalla-nueva-semana')">+ Nueva Semana de Captura</button>
    </div>

    <div id="pantalla-pedido" class="screen">
        <h3 id="info-cabecera" style="font-size: 12px; color: #666; text-align: center; margin-bottom: 5px;"></h3>
        <div class="grid-productos" id="grid-prods"></div>
        
        <button class="btn-custom" onclick="abrirModalEspecial()">✨ VENTA ESPECIAL ($?)</button>

        <div class="flex-row">
            <button class="btn-edad" onclick="setEdad('10-20', this)">10-20</button>
            <button class="btn-edad" onclick="setEdad('20-30', this)">20-30</button>
            <button class="btn-edad" onclick="setEdad('30-40', this)">30-40</button>
            <button class="btn-edad" onclick="setEdad('40-50', this)">40-50</button>
            <button class="btn-edad" onclick="setEdad('50-60+', this)">50-60+</button>
        </div>

        <div class="resumen-total">Total: $<span id="txt-total">0</span></div>
        <button class="btn-success" id="btn-save" onclick="guardarPedidoLocal()">💾 GUARDAR PEDIDO</button>
        
        <div style="display:flex; gap:5px;">
            <button class="btn-primary" onclick="cambiarPantalla('pantalla-carrito')">🛒 Carrito (<span id="count-cart">0</span>)</button>
            <button class="btn-secondary" onclick="cerrarSesionPedido()">Inicio</button>
        </div>
    </div>

    <div id="pantalla-carrito" class="screen">
        <h2>Carrito</h2>
        <div id="lista-carrito"></div>
        <button class="btn-primary" style="margin-top:20px;" onclick="cambiarPantalla('pantalla-pedido')">Volver</button>
        <button class="btn-danger" style="margin-top:10px;" onclick="vaciarCarrito()">Vaciar Todo</button>
    </div>

    <div id="pantalla-nueva-semana" class="screen">
        <h2>Configurar Semana</h2>
        <input type="date" id="input-fecha">
        <input type="number" id="input-temp" placeholder="Temp °C">
        <select id="input-clima">
            <option value="Soleado">☀️ Soleado</option>
            <option value="Nublado">☁️ Nublado</option>
            <option value="Lluvioso">🌧️ Lluvioso</option>
            <option value="Frío">❄️ Frío</option>
        </select>
        <button class="btn-success" onclick="guardarNuevaSemana()">Iniciar Captura</button>
        <button class="btn-secondary" onclick="cambiarPantalla('pantalla-portada')">Volver</button>
    </div>

    <div id="pantalla-resumen" class="screen">
        <h2 id="resumen-titulo"></h2>
        <button class="btn-success" id="btn-re-entrar" style="margin-bottom:15px;">+ Vender más</button>
        <div id="pedidos-historial" style="max-height: 300px; overflow-y: auto;">
            <ul id="lista-pedidos-historial" class="lista-datos"></ul>
        </div>
        <button class="btn-secondary" onclick="cambiarPantalla('pantalla-portada')">Cerrar</button>
    </div>
</div>

<script>
    // --- LÓGICA DEL MODAL ESPECIAL ---
    let modalPaso = 1;

    function abrirModalEspecial() {
        feedback('click');
        modalPaso = 1;
        document.getElementById('modal-especial').style.display = 'flex';
        document.getElementById('modal-titulo').innerText = 'Monto $$';
        document.getElementById('modal-monto').style.display = 'block';
        document.getElementById('modal-monto').value = "";
        document.getElementById('modal-concepto').style.display = 'none';
        document.getElementById('modal-concepto').value = "";
        document.getElementById('btn-modal-next').innerText = 'Siguiente';
        
        // Enfocar automáticamente para abrir el teclado numérico
        setTimeout(() => document.getElementById('modal-monto').focus(), 100);
    }

    function modalSiguiente() {
        if (modalPaso === 1) {
            const m = document.getElementById('modal-monto').value;
            if (!m || isNaN(m)) return alert("Pon un precio válido");
            
            modalPaso = 2;
            document.getElementById('modal-titulo').innerText = '¿Qué es?';
            document.getElementById('modal-monto').style.display = 'none';
            document.getElementById('modal-concepto').style.display = 'block';
            document.getElementById('btn-modal-next').innerText = 'Capturar';
            
            // Enfocar para abrir teclado de texto
            setTimeout(() => document.getElementById('modal-concepto').focus(), 100);
        } else {
            const monto = parseFloat(document.getElementById('modal-monto').value);
            let concepto = document.getElementById('modal-concepto').value.trim();
            if (!concepto) concepto = "Especial"; // Default si no ponen nada
            
            cart.push({ n: concepto, p: monto });
            actualizarUI();
            cerrarModalEspecial();
        }
    }

    function cerrarModalEspecial() {
        document.getElementById('modal-especial').style.display = 'none';
    }

    // --- LÓGICA GENERAL ---
    function feedback(tipo) {
        if (tipo === 'click') {
            const s = document.getElementById('snd-click');
            s.currentTime = 0; s.play().catch(()=>{});
            if (navigator.vibrate) navigator.vibrate(40);
        } else if (tipo === 'cash') {
            const s = document.getElementById('snd-cash');
            s.currentTime = 0; s.play().catch(()=>{});
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }
    }

    const URL_EXCEL = 'https://script.google.com/macros/s/AKfycbz-_Dw2_ZULveE9QNxKkAzJyJ2XZF4Okca9CUsiJmj4MxY2KWwBak9qVGBCWM7apeHk/exec';
    
    const CATALOGO = [
        { n: '1 Litro', label: '🥛 1 Litro', p: 140, color: 'btn-blanco' },
        { n: '1/2 Litro', label: '🥛 1/2 Litro', p: 70, color: 'btn-blanco' },
        { n: 'Vasija 2 Lit', label: '🏺 2Lit', p: 280, color: 'btn-gris' },
        { n: 'Vasija 1/2 Lit', label: '🏺 1/2 Lit', p: 70, color: 'btn-gris' },
        { n: 'Vasija $200', label: '🏺 $200', p: 200, color: 'btn-gris' },
        { n: 'Vasija $300', label: '🏺 $300', p: 300, color: 'btn-gris' },
        { n: 'Vasija 1 Lit', label: '🏺 1 Lit', p: 140, color: 'btn-gris' },
        { n: 'Pezuña', label: '🍖 $35', p: 35, color: 'btn-amarillo' },
        { n: 'Hueso Ch', label: '🦴 Ch', p: 25, color: 'btn-amarillo' },
        { n: 'Hueso Gdo', label: '🦴 Gdo', p: 35, color: 'btn-amarillo' },
        { n: 'Caldo 1/2', label: '🥣 Caldo 1/2', p: 25, color: 'btn-gris' },
        { n: 'Caldo 1 Lit', label: '🥣 Caldo 1 Lit', p: 45, color: 'btn-gris' }
    ];

    let db = JSON.parse(localStorage.getItem('menudo_db')) || [];
    let semActiva = null;
    let cart = [];
    let edadSel = "No especificado";

    window.onload = () => { renderSemanas(); actualizarBotonSync(); document.getElementById('input-fecha').valueAsDate = new Date(); };

    function cambiarPantalla(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        if(id === 'pantalla-portada') { renderSemanas(); actualizarBotonSync(); }
        if(id === 'pantalla-carrito') renderCarrito();
    }

    function renderSemanas() {
        const lista = document.getElementById('lista-semanas');
        lista.innerHTML = db.length ? '' : '<li style="text-align:center;">No hay semanas guardadas.</li>';
        db.forEach((s, i) => {
            const p = s.pedidos.filter(pd => !pd.sincronizado).length;
            const li = document.createElement('li');
            li.innerHTML = `<b>Semana: ${s.fecha}</b><br><small>Pedidos: ${s.pedidos.length}</small>
                            ${p > 0 ? `<span class="badge-sync bg-red">Pend: ${p}</span>` : `<span class="badge-sync bg-green">OK</span>`}`;
            li.onclick = () => verResumenSemana(i);
            lista.appendChild(li);
        });
    }

    function prepararPedido() {
        document.getElementById('info-cabecera').innerText = `Venta: ${semActiva.fecha}`;
        const grid = document.getElementById('grid-prods');
        grid.innerHTML = '';
        CATALOGO.forEach(p => {
            const b = document.createElement('button');
            b.className = 'btn-prod ' + p.color;
            b.innerHTML = `${p.label}<br>$${p.p}`;
            b.onclick = () => { feedback('click'); cart.push({ n: p.n, p: p.p }); actualizarUI(); };
            grid.appendChild(b);
        });
        actualizarUI();
    }

    function guardarPedidoLocal() {
        if(!cart.length) return alert("El carrito está vacío");
        const tot = cart.reduce((a, b) => a + b.p, 0);
        const idx = db.findIndex(s => s.id === semActiva.id);
        db[idx].pedidos.push({
            idPedido: Date.now(), idSemana: semActiva.fecha, rangoEdad: edadSel,
            itemsArray: cart.map(i => ({ nombre: i.n, precio: i.p })),
            total: tot, itemsText: cart.map(i => i.n).join(', '), sincronizado: false
        });
        localStorage.setItem('menudo_db', JSON.stringify(db));
        feedback('cash');
        alert("¡Guardado!");
        cart = []; edadSel = "No especificado";
        document.querySelectorAll('.btn-edad').forEach(b => b.classList.remove('selected'));
        actualizarUI();
    }

    async function sincronizarTodo() {
        const btn = document.getElementById('btn-sync-global');
        btn.innerText = "⏳..."; btn.disabled = true;
        for (let s of db) {
            for (let p of s.pedidos) {
                if (!p.sincronizado) {
                    try {
                        const d = { idSemana: p.idSemana, rangoEdad: p.rangoEdad, itemsArray: p.itemsArray, total: p.total };
                        await fetch(URL_EXCEL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
                        p.sincronizado = true;
                        localStorage.setItem('menudo_db', JSON.stringify(db));
                    } catch (e) { alert("Error red"); btn.disabled = false; return; }
                }
            }
        }
        alert("✅ Sincronizado"); renderSemanas(); actualizarBotonSync(); btn.disabled = false;
    }

    function setEdad(v, b) { feedback('click'); edadSel = v; document.querySelectorAll('.btn-edad').forEach(btn => btn.classList.remove('selected')); b.classList.add('selected'); }
    function actualizarUI() { document.getElementById('txt-total').innerText = cart.reduce((a, b) => a + b.p, 0); document.getElementById('count-cart').innerText = cart.length; }
    function renderCarrito() { const cont = document.getElementById('lista-carrito'); cont.innerHTML = cart.length ? '' : '<p>Vacío</p>'; cart.forEach((item, i) => { const div = document.createElement('div'); div.className = 'item-carrito'; div.innerHTML = `<span>${item.n} ($${item.p})</span><button class="btn-danger" style="width:auto; padding:8px 15px;" onclick="quitar(${i})">X</button>`; cont.appendChild(div); }); }
    function quitar(i) { feedback('click'); cart.splice(i, 1); renderCarrito(); actualizarUI(); }
    function vaciarCarrito() { feedback('click'); cart = []; actualizarUI(); cambiarPantalla('pantalla-pedido'); }
    function cerrarSesionPedido() { feedback('click'); semActiva = null; cart = []; cambiarPantalla('pantalla-portada'); }
    function guardarNuevaSemana() { feedback('click'); let f = document.getElementById('input-fecha').value; if(!f) return alert("Fecha!"); let n = { id: Date.now(), fecha: f, pedidos: [] }; db.push(n); semActiva = n; localStorage.setItem('menudo_db', JSON.stringify(db)); prepararPedido(); cambiarPantalla('pantalla-pedido'); }
    function verResumenSemana(i) { const s = db[i]; document.getElementById('resumen-titulo').innerText = "Sem: " + s.fecha; document.getElementById('btn-re-entrar').onclick = () => { feedback('click'); semActiva = s; prepararPedido(); cambiarPantalla('pantalla-pedido'); }; const h = document.getElementById('lista-pedidos-historial'); h.innerHTML = s.pedidos.length ? '' : '<li>Vacío.</li>'; s.pedidos.slice().reverse().forEach(p => { const li = document.createElement('li'); li.innerHTML = `${p.sincronizado ? '✅' : '⏳'} $${p.total} - ${p.itemsText}`; h.appendChild(li); }); cambiarPantalla('pantalla-resumen'); }
    function actualizarBotonSync() { let tp = 0; db.forEach(s => tp += s.pedidos.filter(p => !p.sincronizado).length); const btn = document.getElementById('btn-sync-global'); if(tp > 0) { btn.style.display = 'block'; document.getElementById('count-sync').innerText = tp; } else { btn.style.display = 'none'; } }
</script>
</body>
</html>
