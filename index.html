<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Ventas Menudo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .app-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .active-screen { display: block; }
        h2, h3 { color: #333; margin-top: 0; }
        button { padding: 12px; margin: 5px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; transition: background 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .grid-productos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn-producto { background: #e2e8f0; color: #333; height: 60px; font-weight: bold; border: 1px solid #cbd5e1; }
        .btn-edad { background: #f8f9fa; border: 1px solid #ccc; flex: 1; }
        .btn-edad.selected { background: #007bff; color: white; border-color: #0056b3; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .lista-datos { list-style: none; padding: 0; }
        .lista-datos li { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .item-carrito { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .resumen-total { font-size: 20px; font-weight: bold; text-align: center; margin: 15px 0; color: #28a745; }
        .info-semana { background: #e9ecef; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="pantalla-portada" class="screen active-screen">
        <h2>Semanas Registradas</h2>
        <ul id="lista-semanas" class="lista-datos"></ul>
        <button class="btn-primary" onclick="cambiarPantalla('pantalla-nueva-semana')">+ Añadir Nueva Semana</button>
    </div>

    <div id="pantalla-nueva-semana" class="screen">
        <h2>Nueva Semana</h2>
        <input type="date" id="input-fecha">
        <input type="number" id="input-temp" placeholder="Temp °C">
        <select id="input-clima">
            <option value="Soleado">Soleado</option>
            <option value="Nublado">Nublado</option>
            <option value="Lluvioso">Lluvioso</option>
        </select>
        <input type="text" id="input-evento" placeholder="Evento">
        <button class="btn-success" onclick="guardarSemana()">Iniciar Captura</button>
        <button class="btn-secondary" onclick="cambiarPantalla('pantalla-portada')">Cancelar</button>
    </div>

    <div id="pantalla-pedido" class="screen">
        <div id="info-semana-activa" class="info-semana"></div>
        <div class="grid-productos" id="contenedor-productos"></div>
        <div class="flex-row" style="display:flex; gap:10px;">
            <button class="btn-edad" onclick="seleccionarEdad('18-30', this)">18-30</button>
            <button class="btn-edad" onclick="seleccionarEdad('31-50', this)">31-50</button>
            <button class="btn-edad" onclick="seleccionarEdad('51+', this)">51+</button>
        </div>
        <div class="resumen-total">Total: $<span id="total-pedido">0</span></div>
        <button class="btn-primary" onclick="cambiarPantalla('pantalla-carrito')">🛒 Ver Carrito</button>
        <button class="btn-success" onclick="guardarPedido()">💾 Save (Guardar Pedido)</button>
        <button class="btn-secondary" onclick="cerrarSemana()">Volver a Portada</button>
    </div>

    <div id="pantalla-carrito" class="screen">
        <h2>Carrito</h2>
        <div id="contenido-carrito"></div>
        <button class="btn-primary" onclick="cambiarPantalla('pantalla-pedido')">Volver</button>
    </div>

    <div id="pantalla-resumen" class="screen">
        <div id="datos-resumen-semana" class="info-semana"></div>
        <button class="btn-success" id="btn-continuar-capturando">Continuar Capturando</button>
        <ul id="lista-pedidos-semana" class="lista-datos"></ul>
        <button class="btn-secondary" onclick="cambiarPantalla('pantalla-portada')">Cerrar</button>
    </div>
</div>

<script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz-_Dw2_ZULveE9QNxKkAzJyJ2XZF4Okca9CUsiJmj4MxY2KWwBak9qVGBCWM7apeHk/exec';
    
    const catalogoProductos = [
        { id: 1, nombre: '1 Litro', precio: 140 }, { id: 2, nombre: '1/2 Litro', precio: 70 },
        { id: 3, nombre: 'Pezuña', precio: 35 }, { id: 4, nombre: 'Caldo 1/2', precio: 25 },
        { id: 5, nombre: 'Caldo 1 Lit', precio: 45 }, { id: 6, nombre: 'Hueso Ch', precio: 25 },
        { id: 7, nombre: 'Hueso Grande', precio: 35 }, { id: 8, nombre: 'Vasija $200', precio: 200 },
        { id: 9, nombre: 'Vasija 1 Lit', precio: 140 }, { id: 10, nombre: 'Vasija 1/2 Lit', precio: 70 }
    ];

    let bdSemanas = JSON.parse(localStorage.getItem('bdSemanas')) || [];
    let semanaActiva = null;
    let carritoActual = [];
    let edadSeleccionada = "No especificado";

    window.onload = () => { renderizarProductos(); renderizarSemanas(); document.getElementById('input-fecha').valueAsDate = new Date(); };

    function cambiarPantalla(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        if(id === 'pantalla-portada') renderizarSemanas();
        if(id === 'pantalla-carrito') renderizarCarrito();
    }

    function renderizarSemanas() {
        const lista = document.getElementById('lista-semanas');
        lista.innerHTML = bdSemanas.length ? '' : '<li>No hay registros</li>';
        bdSemanas.forEach((sem, i) => {
            const li = document.createElement('li');
            li.innerHTML = `Semana: ${sem.fecha} - $${sem.pedidos.reduce((a,b)=>a+b.total,0)}`;
            li.onclick = () => verResumenSemana(i);
            lista.appendChild(li);
        });
    }

    function guardarSemana() {
        const nueva = { id: Date.now(), fecha: document.getElementById('input-fecha').value, 
                       temperatura: document.getElementById('input-temp').value, 
                       clima: document.getElementById('input-clima').value, 
                       evento: document.getElementById('input-evento').value, pedidos: [] };
        bdSemanas.push(nueva);
        semanaActiva = nueva;
        localStorage.setItem('bdSemanas', JSON.stringify(bdSemanas));
        prepararPantallaPedido();
        cambiarPantalla('pantalla-pedido');
    }

    function renderizarProductos() {
        const cont = document.getElementById('contenedor-productos');
        catalogoProductos.forEach(p => {
            const b = document.createElement('button');
            b.className = 'btn-producto';
            b.innerHTML = `${p.nombre}<br>$${p.precio}`;
            b.onclick = () => {
                let item = carritoActual.find(i => i.id === p.id);
                if(item) item.cantidad++; else carritoActual.push({...p, cantidad: 1});
                actualizarTotal();
            };
            cont.appendChild(b);
        });
    }

    function seleccionarEdad(e, b) {
        edadSeleccionada = e;
        document.querySelectorAll('.btn-edad').forEach(btn => btn.classList.remove('selected'));
        b.classList.add('selected');
    }

    function actualizarTotal() {
        let t = carritoActual.reduce((a, i) => a + (i.precio * i.cantidad), 0);
        document.getElementById('total-pedido').innerText = t;
    }

    function guardarPedido() {
        if(!carritoActual.length) return alert("Vacío");
        const pedido = {
            idPedido: Date.now(),
            fecha: semanaActiva.fecha,
            clima: semanaActiva.clima,
            temperatura: semanaActiva.temperatura,
            evento: semanaActiva.evento,
            rangoEdad: edadSeleccionada,
            items: carritoActual.map(i => `${i.cantidad}x ${i.nombre}`).join(', '),
            total: carritoActual.reduce((a, i) => a + (i.precio * i.cantidad), 0)
        };

        // Enviar a Google Sheets
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(pedido)
        });

        bdSemanas.find(s => s.id === semanaActiva.id).pedidos.push(pedido);
        localStorage.setItem('bdSemanas', JSON.stringify(bdSemanas));
        
        alert("¡Guardado en Celular y Excel!");
        carritoActual = [];
        actualizarTotal();
    }

    function verResumenSemana(i) {
        const sem = bdSemanas[i];
        document.getElementById('datos-resumen-semana').innerText = `Semana: ${sem.fecha}`;
        document.getElementById('btn-continuar-capturando').onclick = () => {
            semanaActiva = sem;
            prepararPantallaPedido();
            cambiarPantalla('pantalla-pedido');
        };
        cambiarPantalla('pantalla-resumen');
    }

    function prepararPantallaPedido() {
        document.getElementById('info-semana-activa').innerText = `Capturando: ${semanaActiva.fecha}`;
        carritoActual = [];
        actualizarTotal();
    }

    function cerrarSemana() { semanaActiva = null; cambiarPantalla('pantalla-portada'); }
    function renderizarCarrito() { /* Opcional: similar a versiones anteriores */ }
</script>
</body>
</html>
