<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menudo App Inteligente</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .app-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .active-screen { display: block; }
        h2 { color: #333; text-align: center; }
        button { padding: 12px; margin: 5px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; width: 100%; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .grid-productos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .btn-prod { background: #e9ecef; color: #333; height: 75px; border: 1px solid #ddd; font-size: 13px; }
        .btn-prod:active { transform: scale(0.95); }
        .flex-row { display: flex; gap: 5px; margin: 10px 0; }
        .btn-edad { background: #fff; border: 1px solid #007bff; color: #007bff; flex: 1; font-size: 11px; }
        .btn-edad.selected { background: #007bff; color: white; }
        .resumen-total { font-size: 24px; font-weight: bold; text-align: center; color: #28a745; margin: 15px 0; padding: 10px; border-top: 2px solid #eee; }
        .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-container">
    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="snd-cash" src="https://www.soundjay.com/misc/sounds/cash-register-05.mp3" preload="auto"></audio>

    <div id="pantalla-portada" class="screen active-screen">
        <h2>Menudo App 🍲</h2>
        <div id="lista-semanas" style="margin-bottom:20px;"></div>
        <button class="btn-primary" onclick="cambiarPantalla('pantalla-nueva-semana')">+ Nueva Semana</button>
    </div>

    <div id="pantalla-nueva-semana" class="screen">
        <h2>Nueva Semana</h2>
        <input type="date" id="input-fecha">
        <input type="number" id="input-temp" placeholder="Temp °C">
        <select id="input-clima">
            <option value="Soleado">☀️ Soleado</option>
            <option value="Nublado">☁️ Nublado</option>
            <option value="Lluvioso">🌧️ Lluvioso</option>
            <option value="Frío">❄️ Frío</option>
        </select>
        <button class="btn-success" onclick="guardarSemana()">Empezar</button>
        <button class="btn-secondary" onclick="cambiarPantalla('pantalla-portada')">Cancelar</button>
    </div>

    <div id="pantalla-pedido" class="screen">
        <h3 id="info-cabecera" style="font-size: 12px; color: #666; text-align: center;"></h3>
        <div class="grid-productos" id="grid-prods"></div>
        <div class="flex-row">
            <button class="btn-edad" onclick="setEdad('10-20', this)">10-20</button>
            <button class="btn-edad" onclick="setEdad('20-30', this)">20-30</button>
            <button class="btn-edad" onclick="setEdad('40-50', this)">40-50</button>
            <button class="btn-edad" onclick="setEdad('50-60+', this)">50-60+</button>
        </div>
        <div class="resumen-total">Total: $<span id="txt-total">0</span></div>
        <button class="btn-primary" onclick="cambiarPantalla('pantalla-carrito')">🛒 Ver Carrito (<span id="count-cart">0</span>)</button>
        <button class="btn-success" id="btn-save" onclick="enviarPedido()">💾 SAVE (Guardar Pedido)</button>
        <button class="btn-secondary" onclick="cambiarPantalla('pantalla-portada')">Inicio</button>
    </div>

    <div id="pantalla-carrito" class="screen">
        <h2>Carrito</h2>
        <div id="lista-carrito"></div>
        <button class="btn-primary" style="margin-top:20px;" onclick="cambiarPantalla('pantalla-pedido')">Volver</button>
        <button class="btn-danger" style="margin-top:10px;" onclick="vaciarCarrito()">Vaciar Todo</button>
    </div>
</div>

<script>
    const URL_EXCEL = 'https://script.google.com/macros/s/AKfycbz-_Dw2_ZULveE9QNxKkAzJyJ2XZF4Okca9CUsiJmj4MxY2KWwBak9qVGBCWM7apeHk/exec';
    
    const CATALOGO = [
        { n: '1 Litro', p: 140 }, { n: '1/2 Litro', p: 70 },
        { n: 'Pezuña', p: 35 }, { n: 'Caldo 1/2', p: 25 },
        { n: 'Caldo 1 Lit', p: 45 }, { n: 'Hueso Ch', p: 25 },
        { n: 'Hueso Gde', p: 35 }, { n: 'Vasija $200', p: 200 },
        { n: 'Vasija 1 Lit', p: 140 }, { n: 'Vasija 1/2 Lit', p: 70 },
        { n: 'Vasija $300', p: 300 }, { n: 'Vasija 2 Lit', p: 280 }
    ];

    let db = JSON.parse(localStorage.getItem('menudo_db')) || [];
    let semActiva = null;
    let cart = [];
    let edadSel = "No especificado";

    function play(id) { document.getElementById(id).currentTime = 0; document.getElementById(id).play().catch(()=>{}); }

    function cambiarPantalla(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    function guardarSemana() {
        let f = document.getElementById('input-fecha').value;
        if(!f) return alert("Selecciona fecha");
        semActiva = { id: Date.now(), fecha: f, pedidos: [] };
        prepararPedido();
        cambiarPantalla('pantalla-pedido');
    }

    function prepararPedido() {
        document.getElementById('info-cabecera').innerText = `Semana: ${semActiva.fecha}`;
        const grid = document.getElementById('grid-prods');
        grid.innerHTML = '';
        CATALOGO.forEach(p => {
            const b = document.createElement('button');
            b.className = 'btn-prod';
            b.innerHTML = `${p.n}<br>$${p.p}`;
            b.onclick = () => {
                play('snd-click');
                cart.push({...p}); // Guardamos cada instancia por separado para el desglose
                actualizarUI();
            };
            grid.appendChild(b);
        });
        actualizarUI();
    }

    function setEdad(v, b) {
        play('snd-click');
        edadSel = v;
        document.querySelectorAll('.btn-edad').forEach(btn => btn.classList.remove('selected'));
        b.classList.add('selected');
    }

    function actualizarUI() {
        let total = cart.reduce((a, b) => a + b.p, 0);
        document.getElementById('txt-total').innerText = total;
        document.getElementById('count-cart').innerText = cart.length;
    }

    function renderCarrito() {
        const cont = document.getElementById('lista-carrito');
        cont.innerHTML = cart.length ? '' : '<p>Vacío</p>';
        cart.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'item-carrito';
            div.innerHTML = `<span>${item.n} ($${item.p})</span>
                             <button class="btn-danger" style="width:auto; padding:5px 10px;" onclick="quitar(${i})">X</button>`;
            cont.appendChild(div);
        });
    }

    function quitar(i) {
        cart.splice(i, 1);
        renderCarrito();
        actualizarUI();
    }

    function vaciarCarrito() { cart = []; actualizarUI(); cambiarPantalla('pantalla-pedido'); }

    async function enviarPedido() {
        if(!cart.length) return alert("Carrito vacío");
        const btn = document.getElementById('btn-save');
        btn.innerText = "Guardando..."; btn.disabled = true;

        // Desglosamos los items para que el Script los lea uno por uno
        const itemsParaExcel = cart.map(i => ({ nombre: i.n, precio: i.p }));

        const data = {
            rangoEdad: edadSel,
            itemsArray: itemsParaExcel,
            total: cart.reduce((a, b) => a + b.p, 0)
        };

        try {
            await fetch(URL_EXCEL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            play('snd-cash');
            alert("¡Pedido registrado!");
            cart = [];
            actualizarUI();
        } catch (e) { alert("Error al enviar"); }
        btn.innerText = "💾 SAVE (Guardar Pedido)"; btn.disabled = false;
    }
</script>
</body>
</html>
