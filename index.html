<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menudo App PRO v4.6</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            /* Aumento del 50% en padding global */
            padding: 8px; 
            overflow-x: hidden;
        }
        
        .app-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            /* Aumento del 50% en padding contenedor */
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        
        .screen { display: none; }
        .active-screen { display: block; }
        
        /* Título aumentado 50% */
        h2 { color: #333; text-align: center; margin-bottom: 5px; font-size: 27px; }
        /* Estilo para el número de versión */
        .version-label { text-align: center; color: #888; font-size: 12px; margin-bottom: 15px; display: block; }
        
        /* H4 aumentado 50% */
        h4 { margin: 8px 0; font-size: 20px; color: #666; }
        
        /* Botones estándar aumentados 50% en todo */
        button { 
            /* Padding aumentado 50% */
            padding: 12px; 
            /* Margen aumentado 50% */
            margin: 3px 0; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            /* Fuente aumentada 50% */
            font-size: 18px; 
            width: 100%; 
            font-weight: bold; 
            transition: 0.1s;
        }

        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        /* Botón sync aumentado 50% */
        .btn-sync { background: #ffc107; color: #333; border: 2px solid #e0a800; margin-bottom: 12px; padding: 10px; font-size: 17px; }
        
        /* Grid aumentado 50% en gaps */
        .grid-productos { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
        /* Altura producto aumentada 50% y fuente 50% */
        .btn-prod { background: #e9ecef; color: #333; height: 72px; border: 1px solid #ddd; font-size: 15px; padding: 4px; line-height: 1.2; }
        .btn-prod:active { background: #ced4da; transform: scale(0.96); }
        
        /* Venta Especial aumentada 50% en altura y fuente */
        .btn-custom { background: #6f42c1 !important; color: white !important; height: 54px; margin: 5px 0; font-size: 17px; }

        /* Edades aumentadas 50% en gap, padding y fuente */
        .flex-row { display: flex; gap: 3px; margin: 8px 0; justify-content: space-between; }
        .btn-edad { 
            background: #fff; border: 1px solid #007bff; color: #007bff; 
            padding: 6px 0; font-size: 12px; flex: 1; min-width: 0; border-radius: 6px;
        }
        .btn-edad.selected { background: #007bff; color: white; }
        
        /* Total aumentado 50% */
        .resumen-total { font-size: 27px; font-weight: bold; text-align: center; color: #28a745; margin: 5px 0; padding: 5px; border-top: 2px solid #eee; }
        
        /* Acciones finales aumentadas 50% */
        .action-group { display: flex; gap: 6px; margin-top: 5px; }
        .action-group button { flex: 1; font-size: 17px; padding: 12px; }

        /* Textos de carrito y listas aumentados 50% */
        .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 6px; border-bottom: 1px solid #eee; font-size: 18px; }
        .item-carrito button { padding: 4px 8px; font-size: 14px; width: auto;}
        .lista-datos { list-style: none; padding: 0; margin: 0; }
        .lista-datos li { background: #f8f9fa; border: 1px solid #ddd; padding: 12px; margin-bottom: 8px; border-radius: 8px; font-size: 18px; }
        
        /* Inputs aumentados 50% */
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; }
        /* Badge sync aumentado 50% */
        .badge-sync { font-size: 12px; padding: 2px 6px; border-radius: 12px; margin-left: 5px; }
        .bg-red { background: #dc3545; color: white; }
        .bg-green { background: #28a745; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="snd-cash" src="https://www.soundjay.com/misc/sounds/cash-register-05.mp3" preload="auto"></audio>

    <div id="pantalla-portada" class="screen active-screen">
        <h2>Menudo App 🍲</h2>
        <span class="version-label">v4.6 - Edición Balanceada (+50%)</span>
        
        <button id="btn-sync-global" class="btn-sync" onclick="sincronizarTodo()">🔄 Sync Pendientes (<span id="count-sync">0</span>)</button>
        <h4>Semanas:</h4>
        <ul id="lista-semanas" class="lista-datos"></ul>
        <button class="btn-primary" onclick="cambiarPantalla('pantalla-nueva-semana')">+ Nueva Semana</button>
    </div>

    <div id="pantalla-nueva-semana" class="screen">
        <h2>Configurar</h2>
        <input type="date" id="input-fecha">
        <input type="number" id="input-temp" placeholder="Temp °C">
        <select id="input-clima">
            <option value="Soleado">☀️ Soleado</option>
            <option value="Nublado">☁️ Nublado</option>
            <option value="Lluvioso">🌧️ Lluvioso</option>
            <option value="Frío">❄️ Frío</option>
        </select>
        <button class="btn-success" onclick="guardarNuevaSemana()">Iniciar</button>
        <button class="btn-secondary" onclick="cambiarPantalla('pantalla-portada')">Volver</button>
    </div>

    <div id="pantalla-pedido" class="screen">
        <h3 id="info-cabecera" style="font-size: 12px; color: #666; text-align: center; margin: 0;"></h3>
        
        <div class="grid-productos" id="grid-prods"></div>

        <button class="btn-custom" onclick="agregarPersonalizado()">✨ VENTA ESPECIAL ($?)</button>

        <div class="flex-row">
            <button class="btn-edad" onclick="setEdad('10-20', this)">10-20</button>
            <button class="btn-edad" onclick="setEdad('20-30', this)">20-30</button>
            <button class="btn-edad" onclick="setEdad('30-40', this)">30-40</button>
            <button class="btn-edad" onclick="setEdad('40-50', this)">40-50</button>
            <button class="btn-edad" onclick="setEdad('50-60+', this)">50-60+</button>
        </div>

        <div class="resumen-total">Total: $<span id="txt-total">0</span></div>

        <button class="btn-success" id="btn-save" style="padding: 15px; font-size: 20px; margin-bottom: 8px;" onclick="guardarPedidoLocal()">💾 GUARDAR PEDIDO</button>
        
        <div class="action-group">
            <button class="btn-primary" onclick="cambiarPantalla('pantalla-carrito')">🛒 Carrito (<span id="count-cart">0</span>)</button>
            <button class="btn-secondary" onclick="cerrarSesionPedido()">🏠 Inicio</button>
        </div>
    </div>

    <div id="pantalla-carrito" class="screen">
        <h2>Carrito</h2>
        <div id="lista-carrito"></div>
        <button class="btn-primary" style="margin-top:15px;" onclick="cambiarPantalla('pantalla-pedido')">Volver</button>
        <button class="btn-danger" onclick="vaciarCarrito()">Vaciar</button>
    </div>

    <div id="pantalla-resumen" class="screen">
        <h2 id="resumen-titulo"></h2>
        <button class="btn-success" id="btn-re-entrar" style="margin-bottom:12px; padding:12px;">+ Vender</button>
        <div id="pedidos-historial" style="max-height: 250px; overflow-y: auto;">
            <ul id="lista-pedidos-historial" class="lista-datos"></ul>
        </div>
        <button class="btn-secondary" style="margin-top:12px;" onclick="cambiarPantalla('pantalla-portada')">Cerrar</button>
    </div>
</div>

<script>
    // --- LÓGICA DE FEEDBACK (Ligeramente ajustada para el nuevo tamaño) ---
    function feedback(tipo) {
        if (tipo === 'click') {
            const s = document.getElementById('snd-click');
            s.currentTime = 0; s.play().catch(()=>{});
            if (navigator.vibrate) navigator.vibrate(30); // Vibración un pelín más larga
        } else if (tipo === 'cash') {
            const s = document.getElementById('snd-cash');
            s.currentTime = 0; s.play().catch(()=>{});
            if (navigator.vibrate) navigator.vibrate([70, 40, 70]); // Patrón ajustado
        }
    }

    // BLOQUEO ZOOM IPHONE (Mantenemos la artillería pesada)
    document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    let lastT = 0;
    document.addEventListener('touchend', (e) => {
        let now = Date.now();
        if (now - lastT <= 300) e.preventDefault();
        lastT = now;
    }, false);

    const URL_EXCEL = 'https://script.google.com/macros/s/AKfycbz-_Dw2_ZULveE9QNxKkAzJyJ2XZF4Okca9CUsiJmj4MxY2KWwBak9qVGBCWM7apeHk/exec';
    const CATALOGO = [
        { n: '1 Litro', p: 140 }, { n: '1/2 Litro', p: 70 },
        { n: 'Pezuña', p: 35 }, { n: 'Caldo 1/2', p: 25 },
        { n: 'Caldo 1 Lit', p: 45 }, { n: 'Hueso Ch', p: 25 },
        { n: 'Hueso Gde', p: 35 }, { n: 'Vasija $200', p: 200 },
        { n: 'Vasija 1 Lit', p: 140 }, { n: 'Vasija 1/2 Lit', p: 70 },
        { n: 'Vasija $300', p: 300 }, { n: 'Vasija 2 Lit', p: 280 }
    ];

    let db = JSON.parse(localStorage.getItem('menudo_db')) || [];
    let semActiva = null;
    let cart = [];
    let edadSel = "No especificado";

    window.onload = () => { renderSemanas(); actualizarBotonSync(); document.getElementById('input-fecha').valueAsDate = new Date(); };

    function cambiarPantalla(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        if(id === 'pantalla-portada') { renderSemanas(); actualizarBotonSync(); }
        if(id === 'pantalla-carrito') renderCarrito();
    }

    function agregarPersonalizado() {
        feedback('click');
        let precio = prompt("Monto $$:", "");
        if (!precio || isNaN(precio)) return;
        let nombre = prompt("Concepto:", "");
        if (!nombre) nombre = "Personalizado";
        cart.push({ n: nombre, p: parseFloat(precio) });
        actualizarUI();
    }

    function renderSemanas() {
        const lista = document.getElementById('lista-semanas');
        lista.innerHTML = db.length ? '' : '<li style="text-align:center; color:#999; font-size:16px;">Vacío</li>';
        db.forEach((s, i) => {
            const p = s.pedidos.filter(pd => !pd.sincronizado).length;
            const li = document.createElement('li');
            li.innerHTML = `<b>Sem: ${s.fecha}</b> | <small>Peds: ${s.pedidos.length}</small>
                            ${p > 0 ? `<span class="badge-sync bg-red">Pend: ${p}</span>` : `<span class="badge-sync bg-green">OK</span>`}`;
            li.onclick = () => { feedback('click'); verResumenSemana(i); };
            lista.appendChild(li);
        });
    }

    function prepararPedido() {
        document.getElementById('info-cabecera').innerText = `Venta: ${semActiva.fecha}`;
        const grid = document.getElementById('grid-prods');
        grid.innerHTML = '';
        CATALOGO.forEach(p => {
            const b = document.createElement('button');
            b.className = 'btn-prod';
            b.innerHTML = `${p.n}<br>$${p.p}`;
            b.onclick = () => { feedback('click'); cart.push({...p}); actualizarUI(); };
            grid.appendChild(b);
        });
        actualizarUI();
    }

    function guardarPedidoLocal() {
        if(!cart.length) return alert("¡Carrito vacío!");
        const tot = cart.reduce((a, b) => a + b.p, 0);
        const p = {
            idPedido: Date.now(), idSemana: semActiva.fecha, rangoEdad: edadSel,
            itemsArray: cart.map(i => ({ nombre: i.n, precio: i.p })),
            total: tot, itemsText: cart.map(i => i.n).join(', '), sincronizado: false
        };
        const idx = db.findIndex(s => s.id === semActiva.id);
        db[idx].pedidos.push(p);
        localStorage.setItem('menudo_db', JSON.stringify(db));
        feedback('cash');
        cart = []; edadSel = "No especificado";
        document.querySelectorAll('.btn-edad').forEach(b => b.classList.remove('selected'));
        actualizarUI();
        alert("¡Guardado localmente!");
    }

    async function sincronizarTodo() {
        feedback('click');
        const btn = document.getElementById('btn-sync-global');
        btn.innerText = "⏳ Subiendo..."; btn.disabled = true;
        for (let s of db) {
            for (let p of s.pedidos) {
                if (!p.sincronizado) {
                    try {
                        const d = { idSemana: p.idSemana, rangoEdad: p.rangoEdad, itemsArray: p.itemsArray, total: p.total };
                        await fetch(URL_EXCEL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
                        p.sincronizado = true;
                        localStorage.setItem('menudo_db', JSON.stringify(db));
                    } catch (e) { alert("Error de red"); btn.disabled = false; return; }
                }
            }
        }
        alert("✅ Sincronizado"); renderSemanas(); actualizarBotonSync(); btn.disabled = false;
    }

    function setEdad(v, b) { feedback('click'); edadSel = v; document.querySelectorAll('.btn-edad').forEach(btn => btn.classList.remove('selected')); b.classList.add('selected'); }
    function actualizarUI() { document.getElementById('txt-total').innerText = cart.reduce((a, b) => a + b.p, 0); document.getElementById('count-cart').innerText = cart.length; }
    function renderCarrito() { const c = document.getElementById('lista-carrito'); c.innerHTML = cart.length ? '' : '<p>Vacío</p>'; cart.forEach((item, i) => { const d = document.createElement('div'); d.className = 'item-carrito'; d.innerHTML = `<span>${item.n} ($${item.p})</span><button class="btn-danger" style="width:auto; padding:4px 8px;" onclick="quitar(${i})">X</button>`; c.appendChild(d); }); }
    function quitar(i) { feedback('click'); cart.splice(i, 1); renderCarrito(); actualizarUI(); }
    function vaciarCarrito() { feedback('click'); cart = []; actualizarUI(); cambiarPantalla('pantalla-pedido'); }
    function cerrarSesionPedido() { feedback('click'); semActiva = null; cart = []; cambiarPantalla('pantalla-portada'); }
    function guardarNuevaSemana() { feedback('click'); let f = document.getElementById('input-fecha').value; if(!f) return alert("¡Fecha!"); let n = { id: Date.now(), fecha: f, pedidos: [] }; db.push(n); semActiva = n; localStorage.setItem('menudo_db', JSON.stringify(db)); prepararPedido(); cambiarPantalla('pantalla-pedido'); }
    function verResumenSemana(i) { const s = db[i]; document.getElementById('resumen-titulo').innerText = "Sem: " + s.fecha; document.getElementById('btn-re-entrar').onclick = () => { feedback('click'); semActiva = s; prepararPedido(); cambiarPantalla('pantalla-pedido'); }; const h = document.getElementById('lista-pedidos-historial'); h.innerHTML = s.pedidos.length ? '' : '<li>Vacío</li>'; s.pedidos.slice().reverse().forEach(p => { const li = document.createElement('li'); li.innerHTML = `${p.sincronizado ? '✅' : '⏳'} $${p.total} - ${p.itemsText}`; h.appendChild(li); }); cambiarPantalla('pantalla-resumen'); }
    function actualizarBotonSync() { let tp = 0; db.forEach(s => tp += s.pedidos.filter(p => !p.sincronizado).length); const btn = document.getElementById('btn-sync-global'); if(tp > 0) { btn.style.display = 'block'; document.getElementById('count-sync').innerText = tp; } else { btn.style.display = 'none'; } }
</script>
</body>
</html>
