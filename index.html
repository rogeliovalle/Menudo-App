<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menudo App PRO v4.2</title>
    <style>
        /* CSS para bloquear zoom y mejorar respuesta */
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 15px; 
            overflow-x: hidden;
        }
        
        .app-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .screen { display: none; }
        .active-screen { display: block; }
        h2 { color: #333; text-align: center; margin-bottom: 20px; }
        
        button { 
            padding: 12px; margin: 5px 0; border: none; border-radius: 8px; cursor: pointer; 
            font-size: 15px; width: 100%; font-weight: bold; transition: 0.1s;
        }

        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-sync { background: #ffc107; color: #333; border: 2px solid #e0a800; margin-bottom: 20px; }
        
        .grid-productos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .btn-prod { background: #e9ecef; color: #333; height: 80px; border: 1px solid #ddd; font-size: 13px; }
        .btn-prod:active { background: #ced4da; transform: scale(0.98); }
        
        /* BOTÓN PERSONALIZADO MORADO */
        .btn-custom { background: #6f42c1 !important; color: white !important; height: 80px; }

        .flex-row { display: flex; gap: 5px; margin: 10px 0; }
        .btn-edad { background: #fff; border: 1px solid #007bff; color: #007bff; flex: 1; font-size: 11px; }
        .btn-edad.selected { background: #007bff; color: white; }
        
        .resumen-total { font-size: 24px; font-weight: bold; text-align: center; color: #28a745; margin: 15px 0; padding: 10px; border-top: 2px solid #eee; }
        .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .lista-datos { list-style: none; padding: 0; margin: 0; }
        .lista-datos li { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .badge-sync { font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }
        .bg-red { background: #dc3545; color: white; }
        .bg-green { background: #28a745; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="snd-cash" src="https://www.soundjay.com/misc/sounds/cash-register-05.mp3" preload="auto"></audio>

    <div id="pantalla-portada" class="screen active-screen">
        <h2>Menudo App 🍲</h2>
        <button id="btn-sync-global" class="btn-sync" onclick="sincronizarTodo()" style="display:none;">
            🔄 Sincronizar Pendientes (<span id="count-sync">0</span>)
        </button>
        <h4 style="margin-bottom:10px; color:#666;">Semanas Guardadas:</h4>
        <ul id="lista-semanas" class="lista-datos"></ul>
        <button class="btn-primary" onclick="cambiarPantalla('pantalla-nueva-semana')">+ Nueva Semana de Captura</button>
    </div>

    <div id="pantalla-nueva-semana" class="screen">
        <h2>Configurar Semana</h2>
        <input type="date" id="input-fecha">
        <input type="number" id="input-temp" placeholder="Temp °C">
        <select id="input-clima">
            <option value="Soleado">☀️ Soleado</option>
            <option value="Nublado">☁️ Nublado</option>
            <option value="Lluvioso">🌧️ Lluvioso</option>
            <option value="Frío">❄️ Frío</option>
        </select>
        <button class="btn-success" onclick="guardarNuevaSemana()">Iniciar Captura</button>
        <button class="btn-secondary" onclick="cambiarPantalla('pantalla-portada')">Volver</button>
    </div>

    <div id="pantalla-pedido" class="screen">
        <h3 id="info-cabecera" style="font-size: 12px; color: #666; text-align: center;"></h3>
        
        <div class="grid-productos" id="grid-prods">
            </div>

        <div class="flex-row">
            <button class="btn-edad" onclick="setEdad('10-20', this)">10-20</button>
            <button class="btn-edad" onclick="setEdad('20-30', this)">20-30</button>
            <button class="btn-edad" onclick="setEdad('40-50', this)">40-50</button>
            <button class="btn-edad" onclick="setEdad('50-60+', this)">50-60+</button>
        </div>
        <div class="resumen-total">Total: $<span id="txt-total">0</span></div>
        <button class="btn-primary" onclick="cambiarPantalla('pantalla-carrito')">🛒 Carrito (<span id="count-cart">0</span>)</button>
        <button class="btn-success" id="btn-save" onclick="guardarPedidoLocal()">💾 GUARDAR</button>
        <button class="btn-secondary" onclick="cerrarSesionPedido()">Inicio</button>
    </div>

    <div id="pantalla-carrito" class="screen">
        <h2>Carrito</h2>
        <div id="lista-carrito"></div>
        <button class="btn-primary" style="margin-top:20px;" onclick="cambiarPantalla('pantalla-pedido')">Volver</button>
        <button class="btn-danger" onclick="vaciarCarrito()">Vaciar</button>
    </div>

    <div id="pantalla-resumen" class="screen">
        <h2 id="resumen-titulo"></h2>
        <button class="btn-success" id="btn-re-entrar" style="margin-bottom:15px;">+ Vender</button>
        <div id="pedidos-historial" style="max-height: 250px; overflow-y: auto;">
            <ul id="lista-pedidos-historial" class="lista-datos"></ul>
        </div>
        <button class="btn-secondary" onclick="cambiarPantalla('pantalla-portada')">Cerrar</button>
    </div>
</div>

<script>
    // BLOQUEADOR DE ZOOM PARA IPHONE
    document.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) { event.preventDefault(); }
    }, { passive: false });

    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
        let now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) { event.preventDefault(); }
        lastTouchEnd = now;
    }, false);

    const URL_EXCEL = 'https://script.google.com/macros/s/AKfycbz-_Dw2_ZULveE9QNxKkAzJyJ2XZF4Okca9CUsiJmj4MxY2KWwBak9qVGBCWM7apeHk/exec';
    const CATALOGO = [
        { n: '1 Litro', p: 140 }, { n: '1/2 Litro', p: 70 },
        { n: 'Pezuña', p: 35 }, { n: 'Caldo 1/2', p: 25 },
        { n: 'Caldo 1 Lit', p: 45 }, { n: 'Hueso Ch', p: 25 },
        { n: 'Hueso Gde', p: 35 }, { n: 'Vasija $200', p: 200 },
        { n: 'Vasija 1 Lit', p: 140 }, { n: 'Vasija 1/2 Lit', p: 70 },
        { n: 'Vasija $300', p: 300 }, { n: 'Vasija 2 Lit', p: 280 }
    ];

    let db = JSON.parse(localStorage.getItem('menudo_db')) || [];
    let semActiva = null;
    let cart = [];
    let edadSel = "No especificado";

    window.onload = () => { renderSemanas(); actualizarBotonSync(); document.getElementById('input-fecha').valueAsDate = new Date(); };

    function play(id) { const s = document.getElementById(id); s.currentTime = 0; s.play().catch(()=>{}); }

    function cambiarPantalla(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        if(id === 'pantalla-portada') { renderSemanas(); actualizarBotonSync(); }
        if(id === 'pantalla-carrito') renderCarrito();
    }

    function agregarPersonalizado() {
        play('snd-click');
        let precio = prompt("Monto $$:", "");
        if (!precio || isNaN(precio)) return;
        let nombre = prompt("¿Qué es? (Opcional):", "");
        if (!nombre) nombre = "Personalizado";
        cart.push({ n: nombre, p: parseFloat(precio) });
        actualizarUI();
    }

    function renderSemanas() {
        const lista = document.getElementById('lista-semanas');
        lista.innerHTML = db.length ? '' : '<li style="text-align:center; color:#999;">No hay semanas.</li>';
        db.forEach((s, i) => {
            const pendientes = s.pedidos.filter(p => !p.sincronizado).length;
            const li = document.createElement('li');
            li.innerHTML = `<b>Semana: ${s.fecha}</b><br><small>Total: ${s.pedidos.length}</small>
                            ${pendientes > 0 ? `<span class="badge-sync bg-red">Pendientes: ${pendientes}</span>` : `<span class="badge-sync bg-green">OK</span>`}`;
            li.onclick = () => verResumenSemana(i);
            lista.appendChild(li);
        });
    }

    function prepararPedido() {
        document.getElementById('info-cabecera').innerText = `Venta: ${semActiva.fecha}`;
        const grid = document.getElementById('grid-prods');
        grid.innerHTML = '';
        
        // 1. PRIMERO AGREGAMOS EL BOTÓN PERSONALIZADO MORADO
        const btnC = document.createElement('button');
        btnC.className = 'btn-prod btn-custom';
        btnC.innerHTML = '✨ Venta<br>Especial';
        btnC.onclick = agregarPersonalizado;
        grid.appendChild(btnC);

        // 2. LUEGO EL RESTO DEL CATÁLOGO
        CATALOGO.forEach(p => {
            const b = document.createElement('button');
            b.className = 'btn-prod';
            b.innerHTML = `${p.n}<br>$${p.p}`;
            b.onclick = () => { play('snd-click'); cart.push({...p}); actualizarUI(); };
            grid.appendChild(b);
        });
        actualizarUI();
    }

    function actualizarBotonSync() {
        let tp = 0; db.forEach(s => tp += s.pedidos.filter(p => !p.sincronizado).length);
        const btn = document.getElementById('btn-sync-global');
        if(tp > 0) { btn.style.display = 'block'; document.getElementById('count-sync').innerText = tp; } 
        else { btn.style.display = 'none'; }
    }

    function guardarNuevaSemana() {
        let f = document.getElementById('input-fecha').value;
        if(!f) return alert("Fecha!");
        let nueva = { id: Date.now(), fecha: f, pedidos: [] };
        db.push(nueva);
        semActiva = nueva;
        localStorage.setItem('menudo_db', JSON.stringify(db));
        prepararPedido();
        cambiarPantalla('pantalla-pedido');
    }

    function guardarPedidoLocal() {
        if(!cart.length) return alert("Vacío");
        const tot = cart.reduce((a, b) => a + b.p, 0);
        const pedido = {
            idPedido: Date.now(), idSemana: semActiva.fecha, rangoEdad: edadSel,
            itemsArray: cart.map(i => ({ nombre: i.n, precio: i.p })),
            total: tot, itemsText: cart.map(i => i.n).join(', '), sincronizado: false
        };
        const idx = db.findIndex(s => s.id === semActiva.id);
        db[idx].pedidos.push(pedido);
        localStorage.setItem('menudo_db', JSON.stringify(db));
        play('snd-cash');
        cart = []; edadSel = "No especificado";
        document.querySelectorAll('.btn-edad').forEach(b => b.classList.remove('selected'));
        actualizarUI();
        alert("¡Guardado!");
    }

    async function sincronizarTodo() {
        const btn = document.getElementById('btn-sync-global');
        btn.innerText = "⏳ Subiendo..."; btn.disabled = true;
        for (let s of db) {
            for (let p of s.pedidos) {
                if (!p.sincronizado) {
                    try {
                        const data = { idSemana: p.idSemana, rangoEdad: p.rangoEdad, itemsArray: p.itemsArray, total: p.total };
                        await fetch(URL_EXCEL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                        p.sincronizado = true;
                        localStorage.setItem('menudo_db', JSON.stringify(db));
                    } catch (e) { alert("Error de red"); btn.disabled = false; return; }
                }
            }
        }
        alert("✅ Listo!"); renderSemanas(); actualizarBotonSync(); btn.disabled = false;
    }

    function verResumenSemana(i) {
        const s = db[i];
        document.getElementById('resumen-titulo').innerText = "Sem: " + s.fecha;
        document.getElementById('btn-re-entrar').onclick = () => { semActiva = s; prepararPedido(); cambiarPantalla('pantalla-pedido'); };
        const h = document.getElementById('lista-pedidos-historial');
        h.innerHTML = s.pedidos.length ? '' : '<li>Vacío</li>';
        s.pedidos.slice().reverse().forEach(p => {
            const li = document.createElement('li');
            li.innerHTML = `${p.sincronizado ? '✅' : '⏳'} $${p.total} - ${p.itemsText}`;
            h.appendChild(li);
        });
        cambiarPantalla('pantalla-resumen');
    }

    function setEdad(v, b) { play('snd-click'); edadSel = v; document.querySelectorAll('.btn-edad').forEach(btn => btn.classList.remove('selected')); b.classList.add('selected'); }
    function actualizarUI() { document.getElementById('txt-total').innerText = cart.reduce((a, b) => a + b.p, 0); document.getElementById('count-cart').innerText = cart.length; }
    function renderCarrito() { const c = document.getElementById('lista-carrito'); c.innerHTML = cart.length ? '' : '<p>Vacío</p>'; cart.forEach((item, i) => { const d = document.createElement('div'); d.className = 'item-carrito'; d.innerHTML = `<span>${item.n} ($${item.p})</span><button class="btn-danger" style="width:auto;" onclick="quitar(${i})">X</button>`; c.appendChild(d); }); }
    function quitar(i) { cart.splice(i, 1); renderCarrito(); actualizarUI(); }
    function vaciarCarrito() { cart = []; actualizarUI(); cambiarPantalla('pantalla-pedido'); }
    function cerrarSesionPedido() { semActiva = null; cart = []; cambiarPantalla('pantalla-portada'); }
</script>
</body>
</html>
